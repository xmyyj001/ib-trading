# ===================================================================
# Cloud Build pipeline for IB Trading Cloud Run application
# - Builds application image from prebuilt base image
# - Pushes image to Artifact Registry in the target region
# - Deploys the specified Cloud Run service
# ===================================================================

steps:
  # Step 0: Pull the latest base image to warm cache (optional but speeds up build)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Pull-Base'
    args: ['pull', '$_BASE_IMAGE_URL']

  # Step 1: Build application image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build-Application'
    args:
      - 'build'
      - '--no-cache'
      - '--build-arg'
      - 'BASE_IMAGE_URL=$_BASE_IMAGE_URL'
      - '--tag'
      - '$_APPLICATION_IMAGE:$_IMAGE_TAG'
      - '--file'
      - 'cloud-run/application/Dockerfile'
      - 'cloud-run/application'
    waitFor: ['Pull-Base']

  # Step 2: Push application image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push-Application'
    args: ['push', '$_APPLICATION_IMAGE:$_IMAGE_TAG']
    waitFor: ['Build-Application']

  # Step 3: Dependency safety check (non-blocking)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Safety-Check'
    args:
      - 'run'
      - '--rm'
      - '--entrypoint'
      - 'bash'
      - '$_APPLICATION_IMAGE:$_IMAGE_TAG'
      - '-c'
      - 'pip install --quiet safety && safety check --bare || true'
    waitFor: ['Push-Application']

  # Step 4: Unit tests placeholder (currently skipped)
  - name: 'google/cloud-sdk:slim'
    id: 'Unit-Tests'
    entrypoint: 'bash'
    args: ['-c', 'echo "--- SKIPPING UNIT TESTS ---" && exit 0']
    waitFor: ['Push-Application']

  # Step 5: Initialize Firestore schema (idempotent)
  - name: 'python:3.11-slim'
    id: 'Initialize-Firestore'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if [ "$_INIT_FIRESTORE" = "true" ]; then
          pip install --quiet google-cloud-firestore packaging
          python scripts/firestore/init_firestore.py "$PROJECT_ID"
        else
          echo "Skipping Firestore init step (_INIT_FIRESTORE=false)"
        fi
    waitFor: ['Push-Application']

  # Step 6: Integration tests placeholder (currently skipped)
  - name: 'google/cloud-sdk:slim'
    id: 'Integration-Tests'
    entrypoint: 'bash'
    args: ['-c', 'echo "--- SKIPPING INTEGRATION TESTS ---" && exit 0']
    waitFor: ['Initialize-Firestore']

  # Step 7: Deploy to Cloud Run
  - name: 'google/cloud-sdk:slim'
    id: 'Deploy-to-Cloud-Run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_APPLICATION_IMAGE:$_IMAGE_TAG'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--max-instances'
      - '1'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--service-account'
      - '$_SERVICE_ACCOUNT'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'PROJECT_ID=$PROJECT_ID,TRADING_MODE=$_TRADING_MODE,GCLOUD_REGION=$_REGION,TWS_VERSION=$_TWS_VERSION'
      - '--set-secrets'
      - 'IB_USERNAME=$_USERNAME_SECRET:latest,IB_PASSWORD=$_PASSWORD_SECRET:latest'
    waitFor:
      - 'Safety-Check'
      - 'Unit-Tests'
      - 'Integration-Tests'

substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'ib-trading'
  _SERVICE_ACCOUNT: 'replace-me@project.iam.gserviceaccount.com'
  _TRADING_MODE: 'paper'
  _BASE_IMAGE_URL: 'us-central1-docker.pkg.dev/${PROJECT_ID}/ib-trading-app/base:latest'
  _APPLICATION_IMAGE: 'us-central1-docker.pkg.dev/${PROJECT_ID}/ib-trading-app/application'
  _IMAGE_TAG: 'latest'
  _USERNAME_SECRET: 'ib-paper-username'
  _PASSWORD_SECRET: 'ib-paper-password'
  _TWS_VERSION: '1037'
  _INIT_FIRESTORE: 'true'

timeout: '1800s'
