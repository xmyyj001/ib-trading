steps:

- name: 'gcr.io/cloud-builders/gcloud-slim'
  id: 'Verify Source Code'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "--- Verifying contents of requirements.txt on the build server ---"
    # Note: Adjust path if your app folder is not in the root
    cat cloud-run/application/app/requirements.txt
    echo "----------------------------------------------------------------"

#### build and push Docker image if not existing yet
- name: "google/cloud-sdk:slim"
  id: BuildAndPushApp
  entrypoint: "bash"
  args:
  - "-c"
  - |
    echo "Received _MY_IMAGE_TAG: ${_MY_IMAGE_TAG}"
    gcloud auth configure-docker europe-docker.pkg.dev --quiet
    TARGET_IMAGE="europe-docker.pkg.dev/${PROJECT_ID}/cloud-run-repo/application:${_MY_IMAGE_TAG}"
    TARGET_IMAGE_REPO_PATH="europe-docker.pkg.dev/${PROJECT_ID}/cloud-run-repo/application"
    echo "Checking if image $${TARGET_IMAGE} exists..."
    if ! gcloud artifacts docker images list "$${TARGET_IMAGE_REPO_PATH}" --filter="tags~'^${_MY_IMAGE_TAG}$'" --format="value(tags)" | grep -q "^${_MY_IMAGE_TAG}$"; then
      echo "Image $${TARGET_IMAGE} not found. Building and pushing..."
      LOWERCASE_PROJECT_ID=$(echo "${PROJECT_ID}" | tr '[:upper:]' '[:lower:]')
      
      # Correctly define the base image path for the application's Dockerfile
      BASE_IMAGE_FULL_PATH="europe-docker.pkg.dev/$${LOWERCASE_PROJECT_ID}/eu.gcr.io/cloud-run/base:latest"
      
      docker build \
        --build-arg BASE_IMAGE_FULL_PATH="$${BASE_IMAGE_FULL_PATH}" \
        -t "$${TARGET_IMAGE}" \
        cloud-run/application/
      
      docker push "$${TARGET_IMAGE}"
      echo "Image $${TARGET_IMAGE} built and pushed."
    else
      echo "Image $${TARGET_IMAGE} already exists. Skipping build and push."
    fi

#### [FIX] Unified Test Step
- name: "europe-docker.pkg.dev/${PROJECT_ID}/cloud-run-repo/application:${_MY_IMAGE_TAG}"
  id: RunAllTests
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    echo "--- Running ALL tests (unit and integration) in a unified environment ---"
    
    # The image already has all dependencies installed.
    # Set PYTHONPATH to allow imports from the root of the app code.
    export PYTHONPATH=/home

    # Run unittests first
    echo "--- Running Unit Tests ---"
    python -m unittest discover -v -p "test_*.py"
    
    # Run integration tests second
    # We still need Xvfb for the gateway to run inside the test
    echo "--- Running Integration Tests ---"
    /usr/bin/Xvfb :0 -ac -screen 0 1024x768x16 +extension RANDR &
    export DISPLAY=:0
    
    # Pass necessary env vars for integration tests
    export PROJECT_ID=${PROJECT_ID}
    export K_REVISION=cloudbuild
    export TWS_VERSION=1030
    
    python ./_tests/integration_tests.py

#### Initialize Firestore config documents
- name: 'python:3.9-slim'
  id: InitializeFirestore
  entrypoint: 'bash'
  args:
  - -c
  - |
    set -e
    echo "Initializing Firestore configuration documents for project ${PROJECT_ID}..."
    pip install google-cloud-firestore
    python cloud-run/application/app/lib/init_firestore.py "${PROJECT_ID}"
    echo "Firestore initialization complete."

#### deploy new revision
- name: 'gcr.io/cloud-builders/gcloud-slim'
  id: Deploy
  args:
  - "run"
  - "deploy"
  - "ib-${_TRADING_MODE}"
  - "--image"
  - "europe-docker.pkg.dev/${PROJECT_ID}/cloud-run-repo/application:${_MY_IMAGE_TAG}"
  - "--region"
  - "${_GCP_REGION}"
  - "--platform"
  - "managed"
  - "--max-instances"
  - "1"
  - "--memory"
  - "2Gi"
  - "--timeout"
  - "180s"
  - "--service-account"
  - "ib-trading@${PROJECT_ID}.iam.gserviceaccount.com"
  - "--revision-suffix"
  - "${_MY_IMAGE_TAG}"
  - "--update-labels"
  - "app=ib-trading,trading-mode=${_TRADING_MODE}"
  - "--update-env-vars"
  - "PROJECT_ID=${PROJECT_ID},TRADING_MODE=${_TRADING_MODE},TWS_VERSION=1030"

#### delete old revision(s)
- name: "gcr.io/cloud-builders/gcloud-slim"
  id: Cleanup
  entrypoint: "bash"
  args:
  - "-c"
  - |
    set -e 
    if [[ "${_KEEP}" -gt "0" ]]; then
      echo "Cleaning up old revisions for service ib-${_TRADING_MODE} in region ${_GCP_REGION}, keeping last ${_KEEP} active revisions..."
      # ... (rest of cleanup script is unchanged) ...
    fi

substitutions:
  _GCP_REGION: asia-east1 # Corrected to asia-east1 as per your runtime logs
  _TRADING_MODE: paper 
  _KEEP: "3" 
  _MY_IMAGE_TAG: "latest"

timeout: "1200s"