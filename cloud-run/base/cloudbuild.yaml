# cloud-run/base/cloudbuild.yaml
# Builds the IB Gateway base image and pushes it to Artifact Registry.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build-Base'
    args:
      - 'build'
      - '--tag'
      - '$_BASE_IMAGE'
      - '.'
    dir: 'cloud-run/base'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push-Base'
    args: ['push', '$_BASE_IMAGE']
    waitFor: ['Build-Base']

images:
  - '$_BASE_IMAGE'

substitutions:
  _BASE_IMAGE: 'us-central1-docker.pkg.dev/$PROJECT_ID/ib-trading-app/base:latest'
